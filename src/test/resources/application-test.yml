# =============================================================
# Pilot Broker Backend — Perfil TEST
# Banco H2 em memória — Flyway desabilitado
# =============================================================

spring:

  # H2 em memória (compatibilidade MySQL)
  datasource:
    url: jdbc:h2:mem:pilot_broker_test;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # JPA — TEST
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # Flyway — desabilitado nos testes (H2 cria schema via ddl-auto)
  flyway:
    enabled: false

  # RabbitMQ — desabilitado nos testes unitários e de integração
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# JWT — valor fixo apenas para testes
jwt:
  secret: chave-secreta-apenas-para-testes-unitarios-64-chars-minimo-aqui
  expiration: 3600000

# FMP API — mock nos testes (WireMock / MockWebServer)
fmp:
  api:
    key: test-api-key-mock
    base-url: http://localhost:8089

logging:
  level:
    com.pilotbroker: DEBUG
    org.springframework.security: DEBUG
