# =============================================================
# Pilot Broker Backend — Perfil DEV
# =============================================================

spring:

  # Banco de dados — MySQL local
  datasource:
    url: jdbc:mysql://localhost:3306/pilot_broker?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&serverTimezone=America/Sao_Paulo&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA — DEV
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway controla o schema — nunca usar create/update
    show-sql: true

  # Flyway — migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# Secrets — fallbacks apenas para DEV local (sobrescrever via variáveis de ambiente)
# NUNCA usar estes valores em produção
fmp:
  api:
    key: ${FMP_API_KEY:CONFIGURE_FMP_API_KEY_NO_ARQUIVO_.env}

jwt:
  secret: ${JWT_SECRET:dev-secret-apenas-para-desenvolvimento-local-minimo-64-caracteres-aqui}
  expiration: ${JWT_EXPIRATION:86400000}

# Logs — nível DEBUG para desenvolvimento
logging:
  level:
    com.pilotbroker: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
